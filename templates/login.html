<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-warm-cream);
        }
        .login-box {
            background: white;
            padding: 48px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle-gray);
            box-shadow: var(--shadow-card);
            max-width: 400px;
            width: 100%;
        }
        .login-box h1 {
            font-family: var(--font-playfair);
            font-size: 32px;
            margin-bottom: 8px;
            color: var(--deep-navy-text);
        }
        .login-box .subtitle {
            color: var(--mid-gray-text);
            margin-bottom: 32px;
        }
        .login-box .form-group {
            margin-bottom: 16px;
        }
        .login-box label {
            display: block;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--deep-navy-text);
        }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-subtle-gray);
            border-radius: 6px;
            font-size: 14px;
            font-family: var(--font-inter);
            transition: border-color 0.3s;
        }
        .login-box input:focus {
            outline: none;
            border-color: var(--primary-amber);
        }
        .login-box .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 8px;
        }
        .login-box .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .login-box .brand {
            font-family: var(--font-playfair);
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-amber);
            margin-bottom: 16px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <span class="brand">Portfolio Admin</span>
            <h1>Login</h1>
            <p class="subtitle">Masuk untuk mengelola konten portfolio</p>
            
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            
            <div style="margin-top: 16px; text-align: center; font-size: 12px; color: var(--mid-gray-text);">
                Default: admin / admin123
            </div>
        </div>
    </div>
</body>
</html>
